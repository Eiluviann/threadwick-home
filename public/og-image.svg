<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <rect width="1200" height="630" fill="#f6f4ef"/>
  <rect x="24" y="24" width="1152" height="582" rx="28" fill="#ffffff" stroke="#e7e2d8" stroke-width="2"/>

  <!-- wordmark -->
  <g transform="translate(88 96)">
    <rect width="64" height="64" rx="18" fill="#c2603f"/>
    <circle cx="32" cy="32" r="17" fill="none" stroke="#fff" stroke-width="4"/>
    <line x1="32" y1="13" x2="32" y2="51" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="13" y1="32" x2="51" y2="32" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="84" y="46" font-size="44" font-weight="700" fill="#21201c" font-family="Space Grotesk, Inter, sans-serif" letter-spacing="-1">threadwick</text>
  </g>

  <!-- headline -->
  <text x="88" y="320" font-size="66" font-weight="700" fill="#21201c" font-family="Space Grotesk, Inter, sans-serif" letter-spacing="-1.5">A studio for</text>
  <text x="88" y="394" font-size="66" font-weight="700" fill="#c2603f" font-family="Space Grotesk, Inter, sans-serif" letter-spacing="-1.5">fiber artists</text>

  <text x="90" y="462" font-size="27" fill="#6b675f">Design crochet granny-square charts the way you crochet them.</text>
  <text x="90" y="500" font-size="27" fill="#6b675f">Free in your browser — no account needed.</text>

  <!-- granny medallion motif -->
  <g transform="translate(960 315)" stroke-linecap="round" fill="none">
    <rect x="-150" y="-150" width="300" height="300" rx="24" stroke="#e7e2d8" stroke-width="3"/>
    <g stroke="#8a8275" stroke-width="3">
      <g transform="rotate(0) translate(0 -124)"><line x1="-10" y1="-12" x2="-10" y2="12"/><line x1="0" y1="-12" x2="0" y2="12"/><line x1="10" y1="-12" x2="10" y2="12"/></g>
      <g transform="rotate(90) translate(0 -124)"><line x1="-10" y1="-12" x2="-10" y2="12"/><line x1="0" y1="-12" x2="0" y2="12"/><line x1="10" y1="-12" x2="10" y2="12"/></g>
      <g transform="rotate(180) translate(0 -124)"><line x1="-10" y1="-12" x2="-10" y2="12"/><line x1="0" y1="-12" x2="0" y2="12"/><line x1="10" y1="-12" x2="10" y2="12"/></g>
      <g transform="rotate(270) translate(0 -124)"><line x1="-10" y1="-12" x2="-10" y2="12"/><line x1="0" y1="-12" x2="0" y2="12"/><line x1="10" y1="-12" x2="10" y2="12"/></g>
    </g>
    <g stroke="#21201c" stroke-width="3">
      <g transform="rotate(45) translate(0 -82)"><line x1="-10" y1="-11" x2="-10" y2="11"/><line x1="0" y1="-11" x2="0" y2="11"/><line x1="10" y1="-11" x2="10" y2="11"/></g>
      <g transform="rotate(135) translate(0 -82)"><line x1="-10" y1="-11" x2="-10" y2="11"/><line x1="0" y1="-11" x2="0" y2="11"/><line x1="10" y1="-11" x2="10" y2="11"/></g>
      <g transform="rotate(225) translate(0 -82)"><line x1="-10" y1="-11" x2="-10" y2="11"/><line x1="0" y1="-11" x2="0" y2="11"/><line x1="10" y1="-11" x2="10" y2="11"/></g>
      <g transform="rotate(315) translate(0 -82)"><line x1="-10" y1="-11" x2="-10" y2="11"/><line x1="0" y1="-11" x2="0" y2="11"/><line x1="10" y1="-11" x2="10" y2="11"/></g>
    </g>
    <circle cx="0" cy="0" r="26" stroke="#c2603f" stroke-width="4"/>
    <circle cx="0" cy="0" r="7" fill="#c2603f" stroke="none"/>
  </g>
</svg>
